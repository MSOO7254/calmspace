<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalmSpace — Who Are You?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.8s ease;
    }

    .quiz-container {
      width: 100%;
      max-width: 540px;
      padding: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 10px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1D9E75;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-block {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .question-block.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-label {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .question {
      font-size: 26px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 32px;
      color: #f0f0f0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #ccc;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover {
      border-color: #1D9E75;
      color: #fff;
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: #1D9E75;
      background: #0d2e20;
      color: #fff;
    }

    .option-emoji {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    .next-btn {
      margin-top: 28px;
      background: #1D9E75;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
    }

    .next-btn.visible {
      display: inline-block;
    }

    .next-btn:hover {
      background: #0F6E56;
    }

    .logo {
      text-align: center;
      font-size: 16px;
      color: #1D9E75;
      font-weight: 600;
      margin-bottom: 32px;
    }

    /* Result screen */
    .result-screen {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .result-screen.active {
      display: block;
    }

    .result-emoji {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f0f0f0;
    }

    .result-desc {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .enter-btn {
      background: #1D9E75;
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 40px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .enter-btn:hover {
      background: #0F6E56;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <div class="logo">CalmSpace</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 20%"></div>
    </div>

    <!-- Question 1 -->
    <div class="question-block active" id="q1">
      <div class="step-label">step 1 of 5</div>
      <div class="question">pick your aesthetic 🎨</div>
      <div class="options">
        <button class="option-btn" data-value="hacker" onclick="selectOption(this, 'q1')">
          <span class="option-emoji">🖤</span> dark, minimal, terminal vibes
        </button>
        <button class="option-btn" data-value="soft" onclick="selectOption(this, 'q1')">
          <span class="option-emoji">🌸</span> soft, pastel, gentle and warm
        </button>
        <button class="option-btn" data-value="poetic" onclick="selectOption(this, 'q1')">
          <span class="option-emoji">☁️</span> calm, airy, journal-like
        </button>
        <button class="option-btn" data-value="hype" onclick="selectOption(this, 'q1')">
          <span class="option-emoji">⚡</span> bold, energetic, high contrast
        </button>
        <button class="option-btn" data-value="nostalgic" onclick="selectOption(this, 'q1')">
          <span class="option-emoji">🌙</span> cozy, warm, nostalgic
        </button>
      </div>
      <button class="next-btn" id="next1" onclick="nextQuestion(1)">next →</button>
    </div>

    <!-- Question 2 -->
    <div class="question-block" id="q2">
      <div class="step-label">step 2 of 5</div>
      <div class="question">how do you recharge? ⚡</div>
      <div class="options">
        <button class="option-btn" data-value="introvert" onclick="selectOption(this, 'q2')">
          <span class="option-emoji">🧘</span> alone — silence is everything
        </button>
        <button class="option-btn" data-value="extrovert" onclick="selectOption(this, 'q2')">
          <span class="option-emoji">🎉</span> with people — energy is contagious
        </button>
        <button class="option-btn" data-value="ambivert" onclick="selectOption(this, 'q2')">
          <span class="option-emoji">🌊</span> depends on the day honestly
        </button>
      </div>
      <button class="next-btn" id="next2" onclick="nextQuestion(2)">next →</button>
    </div>

    <!-- Question 3 -->
    <div class="question-block" id="q3">
      <div class="step-label">step 3 of 5</div>
      <div class="question">what's your world? 🌍</div>
      <div class="options">
        <button class="option-btn" data-value="tech" onclick="selectOption(this, 'q3')">
          <span class="option-emoji">💻</span> tech, code, digital spaces
        </button>
        <button class="option-btn" data-value="creative" onclick="selectOption(this, 'q3')">
          <span class="option-emoji">🎨</span> art, music, creative stuff
        </button>
        <button class="option-btn" data-value="people" onclick="selectOption(this, 'q3')">
          <span class="option-emoji">🤝</span> people, community, relationships
        </button>
        <button class="option-btn" data-value="nature" onclick="selectOption(this, 'q3')">
          <span class="option-emoji">🌿</span> nature, wellness, slow living
        </button>
        <button class="option-btn" data-value="hustle" onclick="selectOption(this, 'q3')">
          <span class="option-emoji">🔥</span> hustle, goals, building things
        </button>
      </div>
      <button class="next-btn" id="next3" onclick="nextQuestion(3)">next →</button>
    </div>

    <!-- Question 4 -->
    <div class="question-block" id="q4">
      <div class="step-label">step 4 of 5</div>
      <div class="question">how do you want us to talk to you? 💬</div>
      <div class="options">
        <button class="option-btn" data-value="blunt" onclick="selectOption(this, 'q4')">
          <span class="option-emoji">🔥</span> straight up, no sugar-coating
        </button>
        <button class="option-btn" data-value="gentle" onclick="selectOption(this, 'q4')">
          <span class="option-emoji">🌸</span> soft and gentle please
        </button>
        <button class="option-btn" data-value="poetic" onclick="selectOption(this, 'q4')">
          <span class="option-emoji">☁️</span> slow and reflective
        </button>
        <button class="option-btn" data-value="hype" onclick="selectOption(this, 'q4')">
          <span class="option-emoji">⚡</span> hype me up always
        </button>
        <button class="option-btn" data-value="system" onclick="selectOption(this, 'q4')">
          <span class="option-emoji">🖤</span> terse and minimal, like a system
        </button>
      </div>
      <button class="next-btn" id="next4" onclick="nextQuestion(4)">next →</button>
    </div>

    <!-- Question 5 -->
    <div class="question-block" id="q5">
      <div class="step-label">step 5 of 5</div>
      <div class="question">what are you here for? 🌿</div>
      <div class="options">
        <button class="option-btn" data-value="solo" onclick="selectOption(this, 'q5')">
          <span class="option-emoji">🧘</span> just me — private and personal
        </button>
        <button class="option-btn" data-value="connect" onclick="selectOption(this, 'q5')">
          <span class="option-emoji">🤝</span> open to connecting with others
        </button>
        <button class="option-btn" data-value="mentor" onclick="selectOption(this, 'q5')">
          <span class="option-emoji">💚</span> looking for a mentor or guide
        </button>
        <button class="option-btn" data-value="explore" onclick="selectOption(this, 'q5')">
          <span class="option-emoji">🌊</span> just exploring for now
        </button>
      </div>
      <button class="next-btn" id="next5" onclick="showResult()">see my space →</button>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-desc" id="resultDesc"></div>
      <button class="enter-btn" onclick="enterCalmSpace()">enter my space 🌿</button>
    </div>

  </div>

  <script>
    const answers = {};

    const profiles = {
      hacker: {
        emoji: '🖤',
        title: 'root access granted.',
        desc: 'dark, minimal, real. your space is built for the ones who think in systems and feel in silence. welcome.',
        bg: '#0d0d0d',
        theme: 'hacker'
      },
      soft: {
        emoji: '🌸',
        title: 'welcome, softie.',
        desc: 'gentle, warm, safe. your space is filled with soft colors and softer words. you deserve every bit of it.',
        bg: '#fff0f5',
        theme: 'soft'
      },
      poetic: {
        emoji: '☁️',
        title: 'you think in metaphors.',
        desc: 'slow, reflective, journal-like. your space is built for the ones who feel deeply and speak quietly.',
        bg: '#f5f5f0',
        theme: 'poetic'
      },
      hype: {
        emoji: '⚡',
        title: "LET'S GOOO!!",
        desc: "bold, loud, unstoppable. your space matches your energy. let's build something today.",
        bg: '#0d0d1a',
        theme: 'hype'
      },
      nostalgic: {
        emoji: '🌙',
        title: 'hey, old friend.',
        desc: 'warm, cozy, like a late night conversation. your space feels like home. come in.',
        bg: '#1a1208',
        theme: 'nostalgic'
      }
    };

    function selectOption(btn, questionId) {
      // Remove selected from all options in this question
      const options = document.querySelectorAll('#' + questionId + ' .option-btn');
      options.forEach(function(opt) {
        opt.classList.remove('selected');
      });

      // Select this one
      btn.classList.add('selected');

      // Save answer
      answers[questionId] = btn.getAttribute('data-value');

      // Show next button
      const questionNum = questionId.replace('q', '');
      const nextBtn = document.getElementById('next' + questionNum);
      if (nextBtn) nextBtn.classList.add('visible');
    }

    function nextQuestion(current) {
      // Hide current
      document.getElementById('q' + current).classList.remove('active');

      // Show next
      const next = current + 1;
      document.getElementById('q' + next).classList.add('active');

      // Update progress bar
      const progress = (next / 5) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    function showResult() {
      // Hide last question
      document.getElementById('q5').classList.remove('active');

      // Get personality based on aesthetic choice
      const aesthetic = answers['q1'] || 'soft';
      const profile = profiles[aesthetic];

      // Update background
      document.body.style.background = profile.bg;

      // Fill result screen
      document.getElementById('resultEmoji').textContent = profile.emoji;
      document.getElementById('resultTitle').textContent = profile.title;
      document.getElementById('resultDesc').textContent = profile.desc;

      // Show result
      document.getElementById('resultScreen').classList.add('active');

      // Save to localStorage for now
      localStorage.setItem('calmspace_theme', profile.theme);
      localStorage.setItem('calmspace_answers', JSON.stringify(answers));
    }

    function enterCalmSpace() {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
